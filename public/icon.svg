<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="10" fill="#1a2a3a"/>
  <!-- Livre ouvert -->
  <rect x="10" y="18" width="20" height="28" rx="2" fill="none" stroke="#7eb8d4" stroke-width="2.5"/>
  <rect x="34" y="18" width="20" height="28" rx="2" fill="none" stroke="#7eb8d4" stroke-width="2.5"/>
  <line x1="32" y1="18" x2="32" y2="46" stroke="#7eb8d4" stroke-width="2"/>
  <!-- Lignes de texte gauche -->
  <line x1="14" y1="25" x2="26" y2="25" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="26" y2="30" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="35" x2="22" y2="35" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lignes de texte droite -->
  <line x1="38" y1="25" x2="50" y2="25" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="30" x2="50" y2="30" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="35" x2="46" y2="35" stroke="#7eb8d4" stroke-width="1.5" stroke-linecap="round"/>
